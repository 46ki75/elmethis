name: Qwik

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

env:
  NODE_VERSION: 22.x

jobs:
  lint:
    name: Lint (@elmethis/qwik)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build @elmethis/core
        run: pnpm run build
        working-directory: packages/core

      - name: Lint
        run: pnpm run lint
        working-directory: packages/qwik

  format-check:
    name: Format Check (@elmethis/qwik)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Format Check
        run: pnpm run fmt:check
        working-directory: packages/qwik

  build:
    name: Build (@elmethis/qwik)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build @elmethis/core
        run: pnpm run build
        working-directory: packages/core

      - name: Build
        run: pnpm run build
        working-directory: packages/qwik

  build-storybook:
    name: Build Storybook (@elmethis/qwik)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build @elmethis/core
        run: pnpm run build
        working-directory: packages/core

      - name: Build Storybook
        run: pnpm run build-storybook
        working-directory: packages/qwik

  test-unit:
    name: Test Unit (@elmethis/qwik)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build @elmethis/core
        run: pnpm run build
        working-directory: packages/core

      - name: Test Unit (with coverage)
        run: pnpm run test:coverage
        working-directory: packages/qwik

      # Visibility only — never fails the build. Reports unit-layer coverage;
      # browser-only files (e.g. use-storage, elm-select) read 0% here since
      # their specs run in the separate test-browser job.
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: packages/qwik/coverage/lcov.info
          flags: qwik-unit
          fail_ci_if_error: false

  test-browser:
    name: Test Browser (@elmethis/qwik)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium
        working-directory: packages/qwik

      - name: Build @elmethis/core
        run: pnpm run build
        working-directory: packages/core

      - name: Test Browser (with coverage)
        run: pnpm run test:coverage:browser
        working-directory: packages/qwik

      # Uploaded under the `qwik-browser` flag — Codecov merges it with the
      # `qwik-unit` report into the total. Visibility only; never fails the build.
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: packages/qwik/coverage/lcov.info
          flags: qwik-browser
          fail_ci_if_error: false
