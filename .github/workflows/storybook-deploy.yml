name: Deploy Storybook

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one Pages deploy at a time across the repo. `cancel-in-progress:
# false` lets an in-flight deploy finish — cancelling mid-deploy can leave
# the published site in a half-updated state.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version:
          - 22.x

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build A2UI block catalog JSON
        run: pnpm run build
        working-directory: packages/core

      - name: Run Build (Qwik Storybook)
        run: pnpm run build-storybook
        working-directory: packages/qwik

      - name: Run Build (React Storybook)
        run: pnpm run build-storybook
        working-directory: packages/react

      - name: Run Build (Vue Storybook)
        run: pnpm run build-storybook
        working-directory: packages/vue

      - name: Package Storybooks for deployment
        run: |
          rm -rf ./storybook-static
          mkdir -p ./storybook-static
          cp ./index.html ./storybook-static/index.html
          cp -r ./packages/qwik/storybook-static ./storybook-static/qwik
          cp -r ./packages/react/storybook-static ./storybook-static/react
          cp -r ./packages/vue/storybook-static ./storybook-static/vue
          mkdir -p ./storybook-static/a2ui/v0_9
          cp ./packages/core/dist/a2ui/block_catalog.json ./storybook-static/a2ui/v0_9/block_catalog.json

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./storybook-static"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
